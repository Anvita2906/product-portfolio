<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Journey — Anvita's Universe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=journey-open-44">
  <style>
    :root { --journey-bg: #120c0f; }

    html, body, #root {
      overflow: visible !important;
      height: auto !important;
      position: static !important;
    }

    html, body {
      background: var(--journey-bg);
      overflow-x: hidden !important;
      font-family: 'Manrope', sans-serif;
    }

    #star-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .jy-root {
      min-height: 100vh;
      position: relative;
      z-index: 1;
      background:
        radial-gradient(960px 640px at 18% 4%, rgba(232,168,124,0.06), transparent 60%),
        radial-gradient(900px 680px at 82% 22%, rgba(122,59,74,0.09), transparent 64%),
        radial-gradient(780px 760px at 50% 100%, rgba(212,163,115,0.04), transparent 70%);
    }

    .jy-nav {
      position: sticky;
      top: 0;
      z-index: 20;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 22px 44px;
      background: linear-gradient(180deg, rgba(18,12,15,0.96) 0%, rgba(18,12,15,0.62) 70%, transparent);
      backdrop-filter: blur(8px);
    }
    .jy-back {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: none;
      border: none;
      color: var(--ink-dim);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      cursor: pointer;
    }
    .jy-back:hover { color: var(--orange); }
    .jy-brand {
      font-family: 'Instrument Serif', serif;
      font-size: 18px;
      color: var(--ink);
      justify-self: center;
    }
    .jy-brand em { color: var(--orange); font-style: italic; }

    .jy-hero {
      position: relative;
      padding: 64px 44px 44px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: center;
    }
    .jy-hero-copy {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 1040px;
      text-align: center;
    }
    .jy-title {
      margin: 0 0 16px;
      font-family: 'Instrument Serif', serif;
      font-size: clamp(42px, 6vw, 78px);
      line-height: 1.02;
      color: var(--ink);
    }
    .jy-title em { color: var(--orange); font-style: italic; }
    .jy-lede {
      margin: 0 auto;
      max-width: 54ch;
      font-family: 'Instrument Serif', serif;
      font-size: 20px;
      line-height: 1.45;
      color: var(--ink-dim);
      font-style: italic;
    }

    .jy-shell {
      width: min(1400px, 100%);
      margin: 0 auto;
      padding: 34px 32px 84px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .jy-summary {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }
    .jy-stat {
      padding: 18px 18px 16px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(239,230,216,0.025);
      backdrop-filter: blur(8px);
    }
    .jy-stat-label {
      display: block;
      margin-bottom: 10px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gold);
    }
    .jy-stat-value {
      display: block;
      margin-bottom: 6px;
      font-family: 'Instrument Serif', serif;
      font-size: 30px;
      line-height: 1;
      color: var(--ink);
    }
    .jy-stat-copy {
      font-size: 13px;
      line-height: 1.5;
      color: var(--ink-dim);
    }

    .jy-journey-stage {
      width: 100%;
    }

    .jy-footnote {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      padding-top: 6px;
      color: var(--ink-faint);
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    @media (max-width: 900px) {
      .jy-summary { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <canvas id="star-canvas"></canvas>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://cdn.jsdelivr.net/npm/framer-motion@11/dist/framer-motion.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="planets-data.jsx?v=journey-open-44"></script>
  <script type="text/babel" src="planet-detail.jsx?v=journey-open-44"></script>
  <script src="starfield.js?v=journey-open-44"></script>

  <script type="text/babel">
    const { motion } = Motion;

    function JourneyPage() {
      const journey = window.JOURNEY || [];
      const yearsShipping = journey[1]?.period || '2022 — 2025';
      const currentMode = journey[2]?.role || 'Studying. Choosing. Recalibrating.';
      const [journeyIdx, setJourneyIdx] = React.useState(0);
      const [navVisible, setNavVisible] = React.useState(false);
      const flightRef = React.useRef(null);

      const goBack = () => {
        window.sessionStorage.setItem('returnToUniverse', '1');
        window.location.href = 'solar-system.html';
      };

      React.useEffect(() => {
        const onScroll = () => {
          const firstCard = document.querySelector('[data-station-card="0"]');
          if (!firstCard) return;
          const rect = firstCard.getBoundingClientRect();
          setNavVisible(rect.top < window.innerHeight * 0.8);
        };

        onScroll();
        window.addEventListener('scroll', onScroll);
        window.addEventListener('resize', onScroll);
        return () => {
          window.removeEventListener('scroll', onScroll);
          window.removeEventListener('resize', onScroll);
        };
      }, []);

      return (
        <div className="jy-root">
          <motion.nav
            className="jy-nav"
            initial={{ opacity: 0, y: -12 }}
            animate={{ opacity: 1, y: 0 }}
            transition={{ duration: 0.55, ease: [0.2, 0.7, 0.2, 1] }}
          >
            <button className="jy-back" onClick={goBack}>← back to the universe</button>
            <div className="jy-brand">Anvita&apos;s <em>Journey</em></div>
          </motion.nav>

          <motion.header
            className="jy-hero"
            initial={{ opacity: 0 }}
            animate={{ opacity: 1 }}
            transition={{ duration: 0.9, delay: 0.1 }}
          >
            <motion.div
              className="jy-hero-copy"
              initial={{ opacity: 0, y: 18 }}
              animate={{ opacity: 1, y: 0 }}
              transition={{ duration: 0.75, delay: 0.2, ease: [0.2, 0.7, 0.2, 1] }}
            >
              <h1 className="jy-title">A flight path shaped by <em>curiosity</em>.</h1>
              <p className="jy-lede">From engineering foundations to product conviction, this is the timeline behind how I work, what I learned, and why I changed orbit on purpose.</p>
            </motion.div>
          </motion.header>

          <main className="jy-shell">
            <motion.section
              className="jy-summary"
              initial={{ opacity: 0, y: 18 }}
              animate={{ opacity: 1, y: 0 }}
              transition={{ duration: 0.65, delay: 0.32 }}
            >
              <div className="jy-stat">
                <span className="jy-stat-label">Foundation</span>
                <span className="jy-stat-value">{yearsShipping}</span>
                <span className="jy-stat-copy">Three years of shipping internal platforms, compliance tooling, and cross-functional systems inside engineering orgs.</span>
              </div>
              <div className="jy-stat">
                <span className="jy-stat-label">Current Orbit</span>
                <span className="jy-stat-value">2025 → now</span>
                <span className="jy-stat-copy">{currentMode} The break is where the PM transition stopped being theoretical and became tested.</span>
              </div>
              <div className="jy-stat">
                <span className="jy-stat-label">Destination</span>
                <span className="jy-stat-value">PM roles</span>
                <span className="jy-stat-copy">I’m looking for product roles where systems thinking, taste, and decision clarity all matter at the same time.</span>
              </div>
            </motion.section>

            <motion.section
              className="jy-journey-stage"
              initial={{ opacity: 0, y: 22 }}
              animate={{ opacity: 1, y: 0 }}
              transition={{ duration: 0.72, delay: 0.4, ease: [0.2, 0.7, 0.2, 1] }}
            >
              <JourneySpaceship idx={journeyIdx} onGo={setJourneyIdx} flightRef={flightRef} />
            </motion.section>

            <div className="jy-footnote">
              <span>click stations to jump</span>
              <span>career break = exploration, not absence</span>
              <span>next jump = product management</span>
            </div>
          </main>

          {navVisible && (
            <>
              <button
                className="jump journey-side-btn journey-side-prev"
                onClick={() => setJourneyIdx(Math.max(0, journeyIdx - 1))}
                disabled={journeyIdx === 0}
              >
                ◂
                <span className="journey-side-label">prev station</span>
              </button>

              <button
                className="jump journey-side-btn journey-side-next"
                onClick={() => setJourneyIdx(Math.min(journey.length - 1, journeyIdx + 1))}
                disabled={journeyIdx === journey.length - 1}
              >
                <span className="journey-side-label">next station</span>
                ▸
              </button>

              <div className="journey-bottom-progress">
                {journey.map((_, i) => (
                  <span
                    key={i}
                    className={`jbp-dot ${i === journeyIdx ? 'on' : ''} ${i < journeyIdx ? 'past' : ''}`}
                    onClick={() => setJourneyIdx(i)}
                  />
                ))}
              </div>
            </>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<JourneyPage />);
  </script>
</body>
</html>
