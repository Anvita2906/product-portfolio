<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atelier — Anvita's Universe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    :root { --proj-bg: #120c0f; }

    /* Override the overflow:hidden that styles.css sets for the solar system */
    html, body, #root {
      overflow: visible !important;
      height: auto !important;
      position: static !important;
    }

    html, body {
      background: var(--proj-bg);
      overflow-x: hidden !important;
      font-family: 'Manrope', sans-serif;
    }

    #star-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .px-root {
      min-height: 100vh;
      position: relative;
      z-index: 1;
      background:
        radial-gradient(900px 600px at 20% 0%,  rgba(232,168,124,0.05), transparent 60%),
        radial-gradient(700px 500px at 85% 30%, rgba(122, 59, 74, 0.07), transparent 65%),
        radial-gradient(800px 700px at 50% 100%, rgba(212,163,115,0.04), transparent 70%);
    }

    /* ── Nav ── */
    .px-nav {
      position: sticky; top: 0; z-index: 20;
      display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;
      padding: 22px 44px;
      background: linear-gradient(180deg, rgba(18,12,15,0.96) 0%, rgba(18,12,15,0.6) 70%, transparent);
      backdrop-filter: blur(8px);
    }
    .px-back {
      display: inline-flex; align-items: center; gap: 10px;
      background: none; border: none; color: var(--ink-dim);
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      letter-spacing: 0.22em; text-transform: uppercase; cursor: pointer;
    }
    .px-back:hover { color: var(--orange); }
    .px-brand { font-family: 'Instrument Serif', serif; font-size: 18px; color: var(--ink); letter-spacing: 0.02em; justify-self: center; }
    .px-brand em { color: var(--orange); font-style: italic; }

    /* ── Hero ── */
    .px-hero {
      position: relative; overflow: hidden;
      padding: 64px 44px 56px;
      border-bottom: 1px solid var(--line);
      min-height: 290px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .px-hero-bg {
      position: absolute;
      top: 0;
      right: 0;
      width: 60%;
      height: 100%;
      opacity: 0.34;
      pointer-events: none;
      z-index: 0;
    }
    .px-hero-bg svg { width: 100%; height: 100%; }
    .px-hero-copy {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 980px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }
    .px-title {
      font-family: 'Instrument Serif', serif; font-weight: 400;
      font-size: clamp(40px, 5.5vw, 72px); line-height: 1.05; letter-spacing: -0.01em;
      color: var(--ink); margin: 0 0 16px; max-width: none;
      white-space: nowrap;
    }
    .px-title em { color: var(--orange); font-style: italic; }
    .px-lede {
      font-family: 'Instrument Serif', serif; font-style: italic;
      font-size: 18px; color: var(--ink-dim); max-width: none;
      white-space: nowrap;
    }

    /* ── Filters ── */
    .px-filters-bar { display: flex; gap: 8px; flex-wrap: wrap; padding: 24px 44px 0; }
    .px-filters-bar { justify-content: center; }
    .px-filter {
      padding: 8px 16px; border: 1px solid var(--line);
      background: transparent; color: var(--ink-dim);
      font-family: 'JetBrains Mono', monospace; font-size: 10px;
      letter-spacing: 0.18em; text-transform: uppercase;
      border-radius: 999px; cursor: pointer; transition: all 0.25s ease;
    }
    .px-filter:hover { color: var(--ink); border-color: var(--ink-faint); }
    .px-filter.on { color: var(--orange); border-color: var(--orange); background: rgba(232,168,124,0.06); }

    /* ── Card grid ── */
    .cc-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 24px;
      padding: 36px 44px 80px;
      max-width: 1320px;
      margin: 0 auto;
    }
    @media (max-width: 1080px) { .cc-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 740px)  { .cc-grid { grid-template-columns: repeat(2, 1fr); padding: 24px 20px 60px; gap: 16px; } }
    @media (max-width: 440px)  { .cc-grid { grid-template-columns: 1fr; } }

    /* ── Card outer (sets height + perspective) ── */
    .cc-outer { height: 540px; }
    .cc-outer {
      transform-style: preserve-3d;
      cursor: pointer;
    }

    /* ── Card flipper (animates rotateY) ── */
    .cc-flipper {
      width: 100%; height: 100%;
      position: relative; cursor: pointer;
      transform-style: preserve-3d;
      transition: filter 0.35s ease;
      will-change: transform;
    }
    .cc-flipper::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 18px;
      background:
        radial-gradient(80% 60% at 20% 10%, rgba(255,255,255,0.08), transparent 55%),
        linear-gradient(135deg, rgba(232,168,124,0.16), transparent 42%, transparent 58%, rgba(214,168,168,0.1));
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease;
      z-index: 3;
    }

    /* ── Both faces ── */
    .cc-face {
      position: absolute; inset: 0;
      border-radius: 16px; overflow: hidden;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      -webkit-transform-style: preserve-3d;
      transform-style: preserve-3d;
      transition: transform 0.72s cubic-bezier(0.2, 0.7, 0.2, 1), border-color 0.35s ease, box-shadow 0.35s ease, background 0.35s ease;
    }

    /* ── Front ── */
    .cc-front {
      display: flex; flex-direction: column;
      background: linear-gradient(160deg, #1d1520 0%, #120c0f 55%, #1b1320 100%);
      border: 1px solid rgba(239,230,216,0.1);
      transform: rotateY(0deg);
    }
    .cc-constellation-area {
      flex: 1; position: relative; overflow: hidden;
    }
    .cc-constellation-area svg {
      position: absolute; inset: 0; width: 100%; height: 100%;
    }
    .cc-front .star-mark {
      transform-box: fill-box;
      transform-origin: center;
      transition: transform 0.3s cubic-bezier(0.2, 0.7, 0.2, 1), filter 0.3s cubic-bezier(0.2, 0.7, 0.2, 1);
    }
    .cc-flipper:hover .cc-front .star-mark {
      transform: scale(1.3);
      filter: drop-shadow(0 0 8px #e8a87c) drop-shadow(0 0 14px rgba(232,168,124,0.45));
    }
    .cc-front-footer {
      padding: 20px 22px 22px;
      min-height: 108px;
      border-top: 1px solid rgba(239,230,216,0.07);
      background: rgba(0,0,0,0.28); backdrop-filter: blur(4px);
      display: flex; flex-direction: column; justify-content: center;
      transition: background 0.35s ease, border-color 0.35s ease, transform 0.35s ease;
    }
    .cc-front-role {
      font-family: 'JetBrains Mono', monospace;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--orange);
      text-shadow: 0 0 14px rgba(232,168,124,0.18);
      line-height: 1.45;
      display: block;
      width: 100%;
    }
    .cc-name-front {
      font-family: 'Instrument Serif', serif; font-size: 20px; font-style: italic;
      color: rgba(239,230,216,0.92); line-height: 1.2;
    }
    .cc-flip-hint {
      position: absolute; bottom: 75px; right: 14px;
      font-family: 'JetBrains Mono', monospace; font-size: 8px;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: rgba(239,230,216,0.18); pointer-events: none;
      transition: color 0.35s ease, transform 0.35s ease, opacity 0.35s ease;
    }

    /* ── Kind badge ── */
    .cc-kind {
      font-family: 'JetBrains Mono', monospace; font-size: 8px;
      letter-spacing: 0.2em; text-transform: uppercase;
      padding: 3px 8px; border-radius: 2px; width: fit-content;
    }
    .cc-kind-case { background: rgba(214,168,168,0.15); color: var(--rose); }
    .cc-kind-pres { background: rgba(207,194,173,0.15); color: var(--silver); }
    .cc-kind-vibe { background: rgba(232,168,124,0.16); color: var(--orange); }

    /* ── Back ── */
    .cc-back {
      display: flex; flex-direction: column; gap: 9px;
      padding: 22px 22px 18px;
      transform: rotateY(180deg);
      background: linear-gradient(160deg, #1f1422 0%, #150f12 55%, #1d1420 100%);
      border: 1px solid rgba(232,168,124,0.2);
      overflow-y: auto; scrollbar-width: none;
    }
    .cc-back::-webkit-scrollbar { display: none; }
    .cc-back-head { display: flex; align-items: center; justify-content: space-between; }
    .cc-back-year {
      font-family: 'JetBrains Mono', monospace; font-size: 9px;
      letter-spacing: 0.2em; color: var(--ink-faint); text-transform: uppercase;
    }
    .cc-back-title {
      font-family: 'Instrument Serif', serif; font-size: 28px; line-height: 1.08;
      color: #fff6eb; margin: 0;
      text-align: center;
      text-shadow: 0 0 22px rgba(239,230,216,0.12), 0 0 36px rgba(232,168,124,0.1);
    }
    .cc-back-blurb {
      font-family: 'Instrument Serif', serif; font-size: 14px; font-style: italic;
      line-height: 1.6; color: var(--ink-dim); margin: 0;
      text-align: center;
      display: -webkit-box; -webkit-line-clamp: 6; -webkit-box-orient: vertical; overflow: hidden;
    }
    .cc-role {
      margin: 0;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      color: var(--orange);
      line-height: 1.3;
      text-align: center;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--line);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      text-shadow: 0 0 18px rgba(232, 168, 124, 0.14);
    }
    .cc-btn {
      background: transparent; border: 1px solid var(--line-strong); border-radius: 999px;
      padding: 9px 18px; color: var(--ink); cursor: pointer;
      font-family: 'JetBrains Mono', monospace; font-size: 9px;
      letter-spacing: 0.2em; text-transform: uppercase;
      transition: all 0.25s ease; width: 100%; text-align: center;
    }
    .cc-btn:hover { border-color: var(--orange); color: var(--orange); }
    .cc-btn-primary { background: rgba(232,168,124,0.1); border-color: var(--orange); color: var(--orange); }
    .cc-btn-primary:hover { background: rgba(232,168,124,0.22); }
    .cc-actions {
      display: flex;
      flex-direction: column;
      gap: 7px;
      margin-top: auto;
      padding-top: 10px;
    }
    .cc-related { padding-top: 9px; border-top: 1px solid var(--line); margin-top: auto; }
    .cc-related-lbl {
      font-family: 'JetBrains Mono', monospace; font-size: 8px;
      letter-spacing: 0.22em; text-transform: uppercase; color: var(--gold);
      display: block; margin-bottom: 7px;
    }
    .cc-related-chips { display: flex; gap: 5px; flex-wrap: wrap; }
    .cc-related-chip {
      font-family: 'JetBrains Mono', monospace; font-size: 8px;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--ink-faint); padding: 3px 9px;
      border: 1px solid var(--line); border-radius: 999px;
      background: rgba(239,230,216,0.02);
    }
    .cc-flip-back-hint {
      font-family: 'JetBrains Mono', monospace; font-size: 8px;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: rgba(239,230,216,0.15); text-align: center; padding-top: 8px;
    }

    /* ── Presentation slide preview ── */
    .cc-slide-preview {
      position: relative;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid var(--line);
      background: #0e090b;
      aspect-ratio: 16 / 9;
      flex-shrink: 0;
    }
    .cc-slide-preview image-slot {
      display: block; width: 100%; height: 100%;
    }
    .cc-slide-preview img {
      width: 100%; height: 100%;
      object-fit: cover; object-position: center top;
      display: block;
      transform: scale(1.03);
      animation: previewDrift 8s ease-in-out infinite;
      transition: transform 0.45s ease;
    }
    .cc-slide-preview::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(120deg, transparent 0%, rgba(255,255,255,0.08) 38%, transparent 60%),
        linear-gradient(180deg, transparent 45%, rgba(21,15,18,0.24) 100%);
      background-size: 220% 100%, 100% 100%;
      animation: previewSweep 7s ease-in-out infinite;
    }

    /* ── Vibe-coded / Case study thumb ── */
    .cc-thumb {
      position: relative;
      border-radius: 6px;
      overflow: hidden;
      flex-shrink: 0;
      aspect-ratio: 16 / 9;
      border: 1px solid var(--line);
    }
    .cc-thumb img {
      width: 100%; height: 100%;
      object-fit: cover; object-position: center top;
      display: block;
      transform: scale(1.04);
      animation: previewDrift 8s ease-in-out infinite;
      transition: transform 0.45s ease;
    }
    .cc-thumb img.cc-img-contain,
    .cc-slide-preview img.cc-img-contain {
      object-fit: contain;
      object-position: center center;
      padding: 14px;
      box-sizing: border-box;
      background: linear-gradient(180deg, rgba(12,8,10,0.92), rgba(18,12,15,0.96));
      transform: scale(1);
    }
    .cc-thumb image-slot {
      display: block; width: 100%; height: 100%;
    }
    .cc-thumb::after {
      content: '';
      position: absolute; inset: 0; pointer-events: none;
      background:
        linear-gradient(120deg, transparent 0%, rgba(255,255,255,0.08) 38%, transparent 60%),
        linear-gradient(180deg, transparent 50%, rgba(21,15,18,0.55) 100%);
      background-size: 220% 100%, 100% 100%;
      animation: previewSweep 7s ease-in-out infinite;
    }
    @keyframes previewDrift {
      0%, 100% { transform: scale(1.03) translate3d(0, 0, 0); }
      50% { transform: scale(1.08) translate3d(0, -4px, 0); }
    }
    @keyframes previewSweep {
      0%, 100% { background-position: 120% 0, 0 0; }
      50% { background-position: -20% 0, 0 0; }
    }
    .cc-outer:hover .cc-flipper { filter: brightness(1.05); }
    .cc-outer:hover .cc-flipper::before { opacity: 1; }
    .cc-outer:hover .cc-face {
      border-color: rgba(232,168,124,0.24);
      box-shadow: 0 24px 64px -26px rgba(0,0,0,0.62), 0 0 0 1px rgba(232,168,124,0.06) inset;
    }
    .cc-outer:hover .cc-front {
      transform: rotateY(-180deg);
      background: linear-gradient(160deg, #22181d 0%, #140d11 55%, #201520 100%);
    }
    .cc-outer:hover .cc-back {
      transform: rotateY(0deg);
      background: linear-gradient(160deg, #24171f 0%, #170f13 55%, #22161f 100%);
    }
    .cc-outer:hover .cc-front-footer {
      background: rgba(0,0,0,0.34);
      border-top-color: rgba(232,168,124,0.14);
      transform: translateY(-2px);
    }
    .cc-outer:hover .cc-flip-hint {
      color: rgba(232,168,124,0.62);
      transform: translateY(-2px);
      opacity: 1;
    }
    .cc-outer:hover .cc-slide-preview img,
    .cc-outer:hover .cc-thumb img {
      transform: scale(1.08) translate3d(0, -3px, 0);
    }
    .cc-outer:hover .cc-slide-preview img.cc-img-contain,
    .cc-outer:hover .cc-thumb img.cc-img-contain {
      transform: scale(1.03);
    }
    .cc-outer:hover .cc-back-title {
      color: #fffaf1;
      text-shadow: 0 0 26px rgba(239,230,216,0.16), 0 0 42px rgba(232,168,124,0.14);
    }
    .cc-build-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
    }
    .cc-build-tag {
      padding: 4px 8px;
      border: 1px solid rgba(232,168,124,0.22);
      border-radius: 999px;
      background: rgba(232,168,124,0.06);
      color: var(--gold);
      font-family: 'JetBrains Mono', monospace;
      font-size: 8px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.02);
    }

    /* ── Footer ── */
    .px-footer {
      padding: 36px 44px 56px; border-top: 1px solid var(--line);
      display: flex; justify-content: space-between; align-items: center; gap: 16px;
      font-family: 'JetBrains Mono', monospace; font-size: 10px;
      letter-spacing: 0.22em; text-transform: uppercase; color: var(--ink-faint);
    }
    .px-footer .end-line {
      font-family: 'Instrument Serif', serif; font-style: italic;
      text-transform: none; letter-spacing: 0.005em; font-size: 15px; color: var(--ink-dim);
    }
  </style>
</head>

        lede: 'Zomato helps users filter for calories, protein, and price — but not for where ingredients come from. I designed a discovery layer that helps users find locally sourced meals while giving restaurants and small farmers a stronger signal in the chain.',
        role: 'PRD',
        caseUrl: 'https://www.notion.so/Food-Delivery-App-Local-Farm-to-Table-Discovery-Zomato-32898672403b803f84d8c2b1df69bcfa?source=copy_link',
      },
      {
        id: 'p7', kind: 'Vibe-coded', year: '2025', mag: 1.1, video: true,
        x: 0.52, y: -0.32, thumbUrl: 'assets/projects/wandr.png',
        title: 'Wandr',
        tag: 'AI · travel',
        blurb: 'Your AI travel companion that plans, adapts, and remembers.',
        lede: 'Built for the traveller who hates itinerary apps but still needs one. Wandr learns your style and builds trips around it.',
        role: 'AI product prototype',
        buildTags: ['codex', 'claude code', 'cursor', 'supabase'],
        appUrl: 'https://wandr-sooty.vercel.app/',
        deckUrl: 'https://gamma.app/docs/THANK-YOU-wtodgqo32vfrg0y',
      },
      {
        id: 'p8', kind: 'Vibe-coded', year: '2025', mag: 1.0, video: true,
        x: 0.82, y: -0.58, thumbUrl: 'assets/projects/wedly.png',
        title: 'Wedly',
        tag: 'AI · consumer',
        blurb: 'Your AI wedding planner that takes the chaos out of the big day.',
        lede: 'Wedding planning involves hundreds of decisions, vendors, and timelines. Wedly coordinates all of it so the couple doesn\'t have to.',
        role: 'AI product prototype',
        buildTags: ['codex', 'claude code', 'cursor', 'supabase'],
        appUrl: 'https://wedly-lyart.vercel.app/login',
        deckUrl: 'https://gamma.app/docs/WEDLY-ad3ofuih4627tst',
      },
    ];

    const PROJECT_EDGES = [
      ['p1','p2'], // ChatGPT ↔ LinkedIn (both professional productivity)
      ['p1','p7'], // ChatGPT ↔ Wandr (both AI products)
      ['p2','p5'], // LinkedIn ↔ Netflix (both engagement metric problems)
      ['p2','p4'], // LinkedIn ↔ Groww (both consumer retention)
      ['p3','p4'], // Blinkit ↔ Groww (both Indian consumer)
      ['p3','p8'], // Blinkit ↔ Wedly (both convenience + planning)
      ['p3','p10'], // Blinkit ↔ Zomato (both Indian delivery / commerce)
      ['p5','p6'], // Netflix ↔ Home Cook (both about consumption habits)
      ['p6','p10'], // CookEase ↔ Zomato (both food supply / meal choice)
      ['p6','p7'], // Home Cook ↔ Wandr (both experiential consumer)
      ['p9','p10'], // Uber ↔ Zomato (both consumer PRDs)
      ['p2','p9'], // LinkedIn ↔ Uber (both retention / trust behaviour)
      ['p7','p8'], // Wandr ↔ Wedly (both AI life companions)
    ];

    const BY_ID = Object.fromEntries(PROJECTS.map(p => [p.id, p]));

      const kindClass = k => k === 'Case study' ? 'case' : k === 'Presentation' ? 'pres' : k === 'PRD' ? 'case' : 'vibe';

    const getRelated = id => {
      const set = new Set();
      PROJECT_EDGES.forEach(([a, b]) => {
        if (a === id) set.add(b);
        if (b === id) set.add(a);
      });
      return [...set].map(rid => BY_ID[rid]).filter(Boolean).slice(0, 3);
    };

    /* ─── Hero background constellation ─── */
    function HeroConstellation() {
      const W = 640, H = 320;
      const toP = p => ({ x: (p.x * 0.34 + 0.5) * W, y: (-p.y * 0.32 + 0.5) * H });
      const pos = useMemo(() => Object.fromEntries(PROJECTS.map(p => [p.id, toP(p)])), []);
      const ambientStars = useMemo(() => ([
        { x: 42, y: 38, o: 0.18 }, { x: 98, y: 72, o: 0.22 }, { x: 136, y: 30, o: 0.17 },
        { x: 188, y: 118, o: 0.21 }, { x: 210, y: 58, o: 0.16 }, { x: 254, y: 166, o: 0.24 },
        { x: 292, y: 86, o: 0.2 }, { x: 346, y: 38, o: 0.19 }, { x: 380, y: 132, o: 0.23 },
        { x: 418, y: 76, o: 0.17 }, { x: 456, y: 186, o: 0.27 }, { x: 492, y: 110, o: 0.18 },
        { x: 520, y: 52, o: 0.21 }, { x: 560, y: 164, o: 0.16 }, { x: 586, y: 94, o: 0.25 },
        { x: 610, y: 148, o: 0.18 }, { x: 542, y: 232, o: 0.2 }, { x: 318, y: 238, o: 0.16 },
      ]), []);
      return (
        <svg viewBox={`0 0 ${W} ${H}`} style={{ width: '100%', height: '100%' }}>
          <defs>
            <filter id="hb-blur"><feGaussianBlur stdDeviation="1.6" /></filter>
          </defs>
          {ambientStars.map((star, i) => (
            <circle
              key={`ambient-${i}`}
              cx={star.x}
              cy={star.y}
              r="1"
              fill="#efe6d8"
              opacity={star.o}
            />
          ))}
          {PROJECT_EDGES.map(([a, b], i) => {
            const pa = pos[a], pb = pos[b];
            const len = Math.hypot(pb.x - pa.x, pb.y - pa.y);
            return (
              <line
                key={i}
                x1={pa.x}
                y1={pa.y}
                x2={pb.x}
                y2={pb.y}
        stroke="rgba(239,230,216,0.11)"
                strokeWidth="0.5"
                strokeDasharray={len}
                strokeDashoffset={len}
              >
                <animate
                  attributeName="stroke-dashoffset"
                  from={len}
                  to="0"
                  dur={`${2.1 + i * 0.08}s`}
                  begin={`${0.2 + i * 0.2}s`}
                  fill="freeze"
                />
                <animate
                  attributeName="opacity"
                  values="0;0.85;1"
                  dur={`${2.1 + i * 0.08}s`}
                  begin={`${0.2 + i * 0.2}s`}
                  fill="freeze"
                />
              </line>
            );
          })}
          {PROJECTS.map((p, i) => {
            const { x, y } = pos[p.id];
            const glowR = 6.6 + p.mag * 2.4;
            const innerR = 1.6 + p.mag * 0.35;
            return (
              <g key={p.id}>
                <circle cx={x} cy={y} r={glowR} fill="#e8a87c" opacity="0.11">
                  <animate attributeName="opacity" values="0;0.13" dur="0.7s" begin={`${i * 0.2}s`} fill="freeze" />
                  <animate attributeName="r" values={`${glowR * 0.92};${glowR * 1.08};${glowR * 0.92}`} dur={`${4.3 + i * 0.22}s`} begin={`${i * 0.26}s`} repeatCount="indefinite" />
                  <animate attributeName="opacity" values="0.08;0.18;0.08" dur={`${4.8 + i * 0.27}s`} begin={`${i * 0.18}s`} repeatCount="indefinite" />
                </circle>
                <circle cx={x} cy={y} r={innerR} fill="#efe6d8" opacity="0">
                  <animate attributeName="opacity" values="0;0.98" dur="0.65s" begin={`${0.12 + i * 0.2}s`} fill="freeze" />
                </circle>
                <circle cx={x} cy={y} r={innerR * 0.56} fill="#ffffff" opacity="0" filter="url(#hb-blur)">
                  <animate attributeName="opacity" values="0;0.9" dur="0.65s" begin={`${0.18 + i * 0.2}s`} fill="freeze" />
                </circle>
              </g>
            );
          })}
        </svg>
      );
    }

    /* ─── Constellation SVG for card front ─── */
    function CardConstellation({ project }) {
      const W = 300, H = 230;
      const toP = p => ({ x: (p.x * 0.36 + 0.5) * W, y: (-p.y * 0.36 + 0.5) * H });
      const pos = useMemo(() => Object.fromEntries(PROJECTS.map(p => [p.id, toP(p)])), []);
      const linkedIds = useMemo(() => {
        const set = new Set();
        PROJECT_EDGES.forEach(([a, b]) => {
          if (a === project.id) set.add(b);
          if (b === project.id) set.add(a);
        });
        return set;
      }, [project.id]);

      const gid = `sg-${project.id}`;
      const fid = `sf-${project.id}`;

      return (
        <svg viewBox={`0 0 ${W} ${H}`} style={{ position: 'absolute', inset: 0, width: '100%', height: '100%' }}>
          <defs>
            <radialGradient id={gid} cx="50%" cy="50%" r="50%">
              <stop offset="0%" stopColor="#fff5e2" stopOpacity="0.95" />
              <stop offset="45%" stopColor="#e8a87c" stopOpacity="0.45" />
              <stop offset="100%" stopColor="#e8a87c" stopOpacity="0" />
            </radialGradient>
            <filter id={fid}><feGaussianBlur stdDeviation="1.8" /></filter>
          </defs>

          {/* Edges */}
          {PROJECT_EDGES.map(([a, b], i) => {
            const pa = pos[a], pb = pos[b];
            if (!pa || !pb) return null;
            const lit = project.id === a || project.id === b;
            return (
              <line key={i}
                x1={pa.x} y1={pa.y} x2={pb.x} y2={pb.y}
                stroke={lit ? 'rgba(232,168,124,0.65)' : 'rgba(239,230,216,0.11)'}
                strokeWidth={lit ? 1.3 : 0.7}
                strokeDasharray={lit ? undefined : '3 7'}
              />
            );
          })}

          {/* Stars */}
          {PROJECTS.map(p => {
            const pt = pos[p.id];
            if (!pt) return null;
            const isThis   = p.id === project.id;
            const isLinked = linkedIds.has(p.id);
            const r = isThis ? 5 + p.mag * 2 : isLinked ? 2.6 : 1.4;
            return (
              <g key={p.id} className={isThis ? 'star-mark' : undefined}>
                {isThis && (
                  <>
                    {/* outer breathing halo */}
                    <circle cx={pt.x} cy={pt.y} r={r * 5} fill={`url(#${gid})`}>
                      <animate attributeName="r"       values={`${r*4};${r*6.5};${r*4}`}  dur="3.5s" repeatCount="indefinite" />
                      <animate attributeName="opacity" values="0.55;0.9;0.55"               dur="3.5s" repeatCount="indefinite" />
                    </circle>
                    {/* inner soft blur */}
                    <circle cx={pt.x} cy={pt.y} r={r * 2.2} fill="rgba(232,168,124,0.32)" filter={`url(#${fid})`} />
                  </>
                )}
                <circle cx={pt.x} cy={pt.y} r={r}
                  fill={isThis ? '#fffaf0' : isLinked ? 'rgba(239,230,216,0.78)' : 'rgba(239,230,216,0.28)'}
                />
                {isThis && <circle cx={pt.x} cy={pt.y} r={r * 0.38} fill="#ffffff" />}
              </g>
            );
          })}
        </svg>
      );
    }

    /* ─── Individual constellation card ─── */
    function ConstellationCard({ project, index }) {
      const ref = useRef(null);
      const isInView = useInView(ref, { once: true, amount: 0.12 });

      return (
        <motion.div
          ref={ref}
          className="cc-outer"
          layout
          initial={{ opacity: 0, y: 38 }}
          animate={isInView ? { opacity: 1, y: 0 } : {}}
          exit={{ opacity: 0, scale: 0.9, transition: { duration: 0.28 } }}
          transition={{ duration: 0.68, delay: index * 0.07, ease: [0.2, 0.7, 0.2, 1] }}
          whileHover={{ y: -10, scale: 1.018 }}
          style={{ perspective: '1100px' }}
        >
          <div
            className="cc-flipper"
            style={{ width: '100%', height: '100%', position: 'relative' }}
          >
            {/* ── FRONT ── */}
            <div className="cc-face cc-front"
              style={{ backfaceVisibility: 'hidden', WebkitBackfaceVisibility: 'hidden' }}>
              <div className="cc-constellation-area">
                <CardConstellation project={project} />
              </div>
              <div className="cc-front-footer">
                <span className="cc-front-role">{project.role}</span>
              </div>
              <span className="cc-flip-hint">hover to open ↗</span>
            </div>

            {/* ── BACK ── */}
            <div className="cc-face cc-back"
              style={{ backfaceVisibility: 'hidden', WebkitBackfaceVisibility: 'hidden' }}>

              {project.kind === 'Presentation' ? (
                /* ── Presentation: slide thumbnail layout ── */
                <>
                  <div className="cc-slide-preview">
                    {project.thumbUrl
                      ? <img src={project.thumbUrl} alt={project.title} className={project.thumbFit === 'contain' ? 'cc-img-contain' : ''} />
                      : <image-slot id={`slide-${project.id}`} shape="rect" placeholder="drag slide 1 screenshot here"></image-slot>
                    }
                  </div>

                  <h3 className="cc-back-title">{project.title}</h3>
                  <p className="cc-role">{project.role}</p>
                  <p className="cc-back-blurb">{project.lede}</p>

                  <div className="cc-actions" onClick={e => e.stopPropagation()}>
                    <a
                      href={project.deckUrl || '#'}
                      target="_blank"
                      rel="noopener noreferrer"
                      className={`cc-btn ${project.deckUrl ? 'cc-btn-primary' : ''}`}
                      style={{ display: 'block', textDecoration: 'none', textAlign: 'center', opacity: project.deckUrl ? 1 : 0.4, pointerEvents: project.deckUrl ? 'auto' : 'none' }}
                    >
                      View deck →
                    </a>
                  </div>
                </>
              ) : (
                /* ── Case study / PRD / Vibe-coded: text layout ── */
                <>
                  <div className="cc-thumb">
                    {project.thumbUrl
                      ? <img src={project.thumbUrl} alt={project.title} className={project.thumbFit === 'contain' ? 'cc-img-contain' : ''} />
                      : <image-slot id={`thumb-${project.id}`} shape="rect" placeholder="drag project cover here"></image-slot>
                    }
                  </div>
                  <h3 className="cc-back-title">{project.title}</h3>
                  <p className="cc-role">{project.role}</p>
                  <p className="cc-back-blurb">{project.lede}</p>

                  {project.buildTags?.length > 0 && (
                    <div className="cc-build-tags">
                      {project.buildTags.map(tag => (
                        <span key={tag} className="cc-build-tag">{tag}</span>
                      ))}
                    </div>
                  )}

                  <div className="cc-actions" onClick={e => e.stopPropagation()}>
                    {project.kind === 'Case study' && (
                      <a href={project.caseUrl} target="_blank" rel="noopener noreferrer"
                        className="cc-btn cc-btn-primary"
                        style={{ display: 'block', textDecoration: 'none', textAlign: 'center' }}>
                        Read the post →
                      </a>
                    )}
                    {project.kind === 'PRD' && (
                      <a href={project.caseUrl} target="_blank" rel="noopener noreferrer"
                        className="cc-btn cc-btn-primary"
                        style={{ display: 'block', textDecoration: 'none', textAlign: 'center' }}>
                        View PRD →
                      </a>
                    )}
                    {project.kind === 'Vibe-coded' && (
                      <>
                        {project.deckUrl && (
                          <a href={project.deckUrl} target="_blank" rel="noopener noreferrer"
                            className="cc-btn"
                            style={{ display: 'block', textDecoration: 'none', textAlign: 'center' }}>
                            Video walkthrough →
                          </a>
                        )}
                        <a href={project.appUrl} target="_blank" rel="noopener noreferrer"
                          className="cc-btn cc-btn-primary"
                          style={{ display: 'block', textDecoration: 'none', textAlign: 'center' }}>
                          Try it live →
                        </a>
                        {project.deckUrl && (
                          <a href={project.deckUrl} target="_blank" rel="noopener noreferrer"
                            className="cc-btn"
                            style={{ display: 'block', textDecoration: 'none', textAlign: 'center' }}>
                            View deck →
                          </a>
                        )}
                      </>
                    )}
                  </div>
                </>
              )}

              <div className="cc-flip-back-hint">↩ move away to flip back</div>
            </div>
          </div>
        </motion.div>
      );
    }

    /* ─── Root App ─── */
    function App() {
      const [filter, setFilter] = useState('all');
      const DISPLAY_ORDER = {
        'Product improvement': 1,
        'PRD': 2,
        'Product strategy': 3,
        'Product design': 4,
        'Feature analysis': 5,
        'Root cause analysis': 6,
      };

      const FILTERS = [
        { key: 'all',          label: 'All' },
        { key: 'Case study',   label: 'Case studies' },
        { key: 'PRD',          label: 'PRDs' },
        { key: 'Presentation', label: 'Presentations' },
        { key: 'Vibe-coded',   label: 'Vibe-coded' },
      ];

      const visible = useMemo(
        () => PROJECTS
          .filter(p => filter === 'all' || p.kind === filter)
          .slice()
          .sort((a, b) => {
            const arKind = a.kind === 'Vibe-coded' ? 0 : null;
            const brKind = b.kind === 'Vibe-coded' ? 0 : null;
            if (arKind !== null || brKind !== null) {
              if (arKind === 0 && brKind !== 0) return -1;
              if (brKind === 0 && arKind !== 0) return 1;
            }
            const ar = DISPLAY_ORDER[a.role] ?? 999;
            const br = DISPLAY_ORDER[b.role] ?? 999;
            if (ar !== br) return ar - br;
            return a.title.localeCompare(b.title);
          }),
        [filter]
      );

      const goBack = () => {
        if (window.opener && !window.opener.closed) window.close();
        else {
          window.sessionStorage.setItem('returnToUniverse', '1');
          window.location.href = 'solar-system.html';
        }
      };

      return (
        <div className="px-root">

          {/* Nav */}
          <motion.nav
            className="px-nav"
            initial={{ opacity: 0, y: -14 }}
            animate={{ opacity: 1, y: 0 }}
            transition={{ duration: 0.55, ease: [0.2, 0.7, 0.2, 1] }}
            style={{ position: 'sticky', top: 0, zIndex: 20 }}
          >
            <motion.button
              className="px-back"
              onClick={goBack}
              whileHover={{ x: -3, color: 'var(--orange)' }}
              transition={{ duration: 0.2 }}
            >
              ← back to the universe
            </motion.button>
            <div className="px-brand">Anvita's <em>Atelier</em></div>
          </motion.nav>

          {/* Hero */}
          <motion.header
            className="px-hero"
            initial={{ opacity: 0 }}
            animate={{ opacity: 1 }}
            transition={{ duration: 1, delay: 0.15 }}
          >
            <div className="px-hero-bg"><HeroConstellation /></div>
            <motion.div
              className="px-hero-copy"
              initial={{ opacity: 0, y: 22 }}
              animate={{ opacity: 1, y: 0 }}
              transition={{ duration: 0.78, delay: 0.28, ease: [0.2, 0.7, 0.2, 1] }}
            >
              <h1 className="px-title">Constellations of <em>Conviction</em>.</h1>
              <p className="px-lede">Strategies, prototypes, and case studies — each one a decision I shaped.</p>
            </motion.div>
          </motion.header>

          {/* Filters */}
          <motion.div
            className="px-filters-bar"
            initial={{ opacity: 0, y: 8 }}
            animate={{ opacity: 1, y: 0 }}
            transition={{ duration: 0.55, delay: 0.45 }}
          >
            {FILTERS.map(f => (
              <motion.button
                key={f.key}
                className={`px-filter ${filter === f.key ? 'on' : ''}`}
                onClick={() => setFilter(f.key)}
                whileHover={{ scale: 1.04 }}
                whileTap={{ scale: 0.96 }}
                transition={{ duration: 0.18 }}
              >
                {f.label}
              </motion.button>
            ))}
          </motion.div>

          {/* Card grid */}
          <main className="cc-grid">
            <AnimatePresence mode="popLayout">
              {visible.map((p, i) => (
                <ConstellationCard key={p.id} project={p} index={i} />
              ))}
            </AnimatePresence>
          </main>

          {/* Footer */}
          <motion.footer
            className="px-footer"
            initial={{ opacity: 0 }}
            whileInView={{ opacity: 1 }}
            viewport={{ once: true, amount: 0.5 }}
            transition={{ duration: 0.9 }}
          >
            <span>End of constellation.</span>
            <span className="end-line">More transmissions arriving — orbit will update.</span>
            <span>v0.1 · 2025</span>
          </motion.footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
