<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arsenal — Anvita's Universe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=journey-open-44">
  <style>
    :root { --skills-bg: #120c0f; }

    html, body, #root {
      overflow: visible !important;
      height: auto !important;
      position: static !important;
    }

    html, body {
      background: var(--skills-bg);
      overflow-x: hidden !important;
      font-family: 'Manrope', sans-serif;
    }

    #star-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .sk-root {
      min-height: 100vh;
      position: relative;
      z-index: 1;
      background:
        radial-gradient(900px 620px at 18% 8%, rgba(93,202,122,0.05), transparent 60%),
        radial-gradient(820px 620px at 82% 16%, rgba(214,168,168,0.06), transparent 62%),
        radial-gradient(900px 780px at 50% 100%, rgba(184,160,214,0.08), transparent 68%);
    }

    .sk-nav {
      position: sticky;
      top: 0;
      z-index: 20;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 22px 44px;
      background: linear-gradient(180deg, rgba(18,12,15,0.96) 0%, rgba(18,12,15,0.62) 70%, transparent);
      backdrop-filter: blur(8px);
    }
    .sk-back {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: none;
      border: none;
      color: var(--ink-dim);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      cursor: pointer;
    }
    .sk-back:hover { color: var(--orange); }
    .sk-brand {
      font-family: 'Instrument Serif', serif;
      font-size: 18px;
      color: var(--ink);
      justify-self: center;
    }
    .sk-brand em { color: #c4a8e0; font-style: italic; }

    .sk-hero {
      position: relative;
      padding: 64px 44px 50px;
      display: flex;
      justify-content: center;
    }
    .sk-hero-copy {
      width: 100%;
      max-width: 1040px;
      text-align: center;
    }
    .sk-title {
      margin: 0 0 16px;
      font-family: 'Instrument Serif', serif;
      font-size: clamp(42px, 6vw, 76px);
      line-height: 1.02;
      color: var(--ink);
    }
    .sk-title em { color: #c4a8e0; font-style: italic; }
    .sk-lede {
      margin: 0 auto;
      max-width: 56ch;
      font-family: 'Instrument Serif', serif;
      font-size: 20px;
      line-height: 1.45;
      color: var(--ink-dim);
      font-style: italic;
    }

    .sk-shell {
      width: min(1580px, 100%);
      margin: 0 auto;
      padding: 22px 22px 84px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .sk-stage {
      width: 100%;
    }
    .sk-stage .skills-page {
      gap: 0;
    }
    .sk-stage .skills-hero {
      display: none;
    }
    .sk-stage .skills-space {
      min-height: 1420px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <canvas id="star-canvas"></canvas>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://cdn.jsdelivr.net/npm/framer-motion@11/dist/framer-motion.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="planets-data.jsx?v=journey-open-44"></script>
  <script type="text/babel" src="planet-detail.jsx?v=journey-open-44"></script>
  <script src="starfield.js?v=journey-open-44"></script>

  <script type="text/babel">
    const { motion } = Motion;

    function SkillsPage() {
      const goBack = () => {
        window.sessionStorage.setItem('returnToUniverse', '1');
        window.location.href = 'solar-system.html';
      };

      return (
        <div className="sk-root">
          <motion.nav
            className="sk-nav"
            initial={{ opacity: 0, y: -12 }}
            animate={{ opacity: 1, y: 0 }}
            transition={{ duration: 0.55, ease: [0.2, 0.7, 0.2, 1] }}
          >
            <button className="sk-back" onClick={goBack}>← back to the universe</button>
            <div className="sk-brand">Anvita&apos;s <em>Arsenal</em></div>
          </motion.nav>

          <motion.header
            className="sk-hero"
            initial={{ opacity: 0 }}
            animate={{ opacity: 1 }}
            transition={{ duration: 0.9, delay: 0.1 }}
          >
            <motion.div
              className="sk-hero-copy"
              initial={{ opacity: 0, y: 18 }}
              animate={{ opacity: 1, y: 0 }}
              transition={{ duration: 0.75, delay: 0.2, ease: [0.2, 0.7, 0.2, 1] }}
            >
              <h1 className="sk-title">An arsenal built across <em>systems, product, and AI.</em></h1>
              <p className="sk-lede">The technical foundation, product judgment, and automation layer I carry into the work. A static sky-map of the tools I reach for most.</p>
            </motion.div>
          </motion.header>

          <main className="sk-shell">
            <motion.section
              className="sk-stage"
              initial={{ opacity: 0, y: 22 }}
              animate={{ opacity: 1, y: 0 }}
              transition={{ duration: 0.72, delay: 0.4, ease: [0.2, 0.7, 0.2, 1] }}
            >
              <SkillsArsenal />
            </motion.section>

          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<SkillsPage />);
  </script>
</body>
</html>
